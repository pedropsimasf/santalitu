name: Atualizar preces automaticamente

on:
  schedule:
    # Quinta-feira às 09:00 UTC (~06:00 em Brasília)
    - cron: "0 9 * * 4"
  workflow_dispatch:

jobs:
  update-preces:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Rodar crawler de preças
        run: |
          python preces_crawler.py

      - name: Configurar usuário do Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verificar se há mudanças
        run: |
          if git status --porcelain | grep .; then
            echo "CHANGES=true" >> $GITHUB_ENV
          else
            echo "CHANGES=false" >> $GITHUB_ENV
          fi

      - name: Commit e push das mudanças
        if: env.CHANGES == 'true'
        run: |
          git add .
          git commit -m "Atualiza preças automaticamente"
          git push
